#!/usr/sbin/nft -f
#
# Simple desktop firewall
#   - Strict inbound (LAN services only)
#   - Permissive outbound
#   - Logging for dropped inbound
#

flush ruleset

define LAN    = { 192.168.122.0/24, 192.168.156.0/28, 192.168.157.0/26, 192.168.158.0/28 }
define SSH_IN = { 192.168.157.0/26, 192.168.158.0/28 }

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;

        # Conntrack: allow established, drop invalid
        ct state invalid drop
        ct state { established, related } accept

        # Loopback
        iifname "lo" accept

        # DHCP (must come before LAN rules — src is 0.0.0.0 during initial lease)
        udp sport 67-68 udp dport 67-68 accept

        # ICMPv6 neighbor/router discovery + ping
        icmpv6 type { echo-request, nd-router-advert, nd-neighbor-solicit, nd-neighbor-advert } accept

        # SSH and Mosh from clients and WireGuard only
        ip saddr $SSH_IN tcp dport 22 accept
        ip saddr $SSH_IN udp dport 59999 accept

        # LAN: mDNS, ping
        ip saddr $LAN udp dport 5353 accept
        ip saddr $LAN icmp type echo-request accept

        # Multicast (mDNS, SSDP)
        ip daddr 224.0.0.251 udp dport 5353 accept
        ip daddr 239.255.255.250 udp dport 1900 accept

        # Log anything else that gets dropped
        limit rate 3/minute burst 5 packets log prefix "[nft:in] " level warn
    }

    chain forward {
        type filter hook forward priority 0; policy drop;

        # Libvirt VM traffic (uncomment if needed)
        # iifname "virbr0" accept
        # oifname "virbr0" ct state { established, related } accept
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}
